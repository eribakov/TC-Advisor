<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tackl Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="header">
    <div class="header__brand">
      <img src="icons/logo.svg" alt="Tackl logo" width="32" height="32">
      <h1 class="header__title">Tackl</h1>
    </div>
    <p class="header__tagline">Settings</p>
  </header>

  <main class="main">
    <section class="section">
      <h2 class="section__title">Gemini API Key</h2>
      <p class="section__desc">Enter your free Gemini API key from <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a></p>
      <input id="api-key-input" type="text" placeholder="AIzaSy..." style="width:100%; padding:8px; margin-bottom:8px;" />
      <button type="button" class="btn btn--primary" id="save-btn">Save Key</button>
      <p id="status" style="margin-top:8px;"></p>
    </section>
  </main>

  <script src="./src/settings.ts" type="module"></script>
</body>
</html>
